<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>TERRAE News Widget</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  @font-face { font-family:'AutautGrotesk'; font-weight:400; src:url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Regular.otf') format('opentype'); }
  @font-face { font-family:'AutautGrotesk'; font-weight:500; src:url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Medium.otf') format('opentype'); }
  @font-face { font-family:'AutautGrotesk'; font-weight:600; src:url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Semibold.otf') format('opentype'); }
  @font-face { font-family:'AutautGrotesk'; font-weight:700; src:url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Bold.otf') format('opentype'); }
</style>
<style>
  :root {
    --ink: #0a0a0a;
    --muted: #6b6b66;
    --gap: 20px;
    --radius: 4px;
    --dur: 480ms;
    --detail-max: 680px;
    --detail-pad: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    color: var(--ink);
    font-family: 'AutautGrotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; }

  /* ── HEADER ── */
  .section-head {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .pill {
    display: inline-flex; align-items: center;
    background: var(--ink); color: #fff;
    padding: 8px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600; border: 0;
  }
  .nav-arrows { display: flex; gap: 8px; }
  .arrow {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--ink); background: transparent;
    display: grid; place-items: center;
    cursor: pointer; color: var(--ink);
    transition: background var(--dur), color var(--dur), opacity var(--dur);
  }
  .arrow:hover { background: var(--ink); color: #fff; }
  .arrow:disabled { opacity: 0.25; }
  .arrow svg { width: 14px; height: 14px; }
  .rule { height: 1px; background: var(--ink); margin-bottom: 24px; }

  /* ── CAROSELLO ── */
  #view-carousel { display: block; }
  .viewport { overflow: hidden; width: 100%; }
  .track {
    display: grid; grid-auto-flow: column;
    grid-auto-columns: calc((100% - 3 * var(--gap)) / 3.8);
    gap: var(--gap);
    transition: transform var(--dur) cubic-bezier(.5,.05,.2,1);
    will-change: transform;
  }
  @media (max-width: 900px) { .track { grid-auto-columns: calc((100% - 2 * var(--gap)) / 2.3); } }
  @media (max-width: 600px) { .track { grid-auto-columns: 100%; } }

  .card { display: flex; flex-direction: column; gap: 10px; cursor: pointer; }
  .card:hover .card-title { text-decoration: underline; }
  .thumb {
    width: 100%; aspect-ratio: 325/200;
    background: #ddd; border-radius: var(--radius);
    overflow: hidden; position: relative; flex-shrink: 0;
  }
  .thumb img, .thumb svg {
    display: block; width: 100%; height: 100%;
    object-fit: cover; transition: opacity 0.2s;
  }
  .card:hover .thumb img { opacity: 0.88; }
  .date-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--ink); color: #fff;
    font: 500 11px/1 'AutautGrotesk', sans-serif;
    padding: 6px 10px; border-radius: 2px;
    letter-spacing: 0.04em;
  }
  .card-kicker {
    font: 500 10px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .card-title { font-size: 20px; line-height: 1.25; font-weight: 600; color: var(--ink); }
  .card-excerpt { font-size: 20px; line-height: 1.25; font-weight: 400; color: var(--ink); margin-top: -6px; }

  .loading, .error {
    text-align: center; padding: 40px 0;
    font: 500 12px/1 'AutautGrotesk', monospace;
    color: var(--muted);
  }
  .error { color: #c00; }

  /* ── DETTAGLIO IN-PLACE ── */
  #view-detail { display: none; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; border: none; padding: 0;
    cursor: pointer;
    font: 500 11px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--muted);
    margin: 0 auto 32px;
    max-width: var(--detail-max);
    width: 100%;
    padding: 0 var(--detail-pad);
    display: flex;
  }
  .back-btn:hover { color: var(--ink); }
  .back-btn svg { width: 12px; height: 12px; }

  .detail-kicker,
  .detail-title,
  .detail-date,
  .detail-estratto,
  .detail-testo,
  .detail-rule {
    max-width: var(--detail-max);
    margin-left: auto; margin-right: auto;
    padding-left: var(--detail-pad);
    padding-right: var(--detail-pad);
  }

  .detail-rule {
    height: 1px; background: var(--ink);
    margin: 0 auto 32px;
    padding-left: 0; padding-right: 0;
    max-width: calc(var(--detail-max) - 2 * var(--detail-pad));
  }

  .detail-kicker {
    font: 500 10px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  .detail-title {
    font-size: 40px; line-height: 1.1; font-weight: 600;
    color: var(--ink); margin-bottom: 12px;
    letter-spacing: -0.01em; text-wrap: balance;
  }
  .detail-date {
    font-size: 12px; color: var(--muted);
    margin-bottom: 40px; letter-spacing: 0.04em;
  }
  .detail-img {
    width: calc(100% - 2 * var(--detail-pad));
    max-width: 900px;
    aspect-ratio: 9 / 5;
    overflow: hidden; background: #ddd;
    margin: 0 auto 56px;
  }
  .detail-img img, .detail-img svg {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .detail-estratto {
    font-size: 22px; line-height: 1.45; font-weight: 500;
    color: var(--ink);
    margin: 0 auto 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(10,10,10,0.12);
    text-wrap: pretty;
  }
  .detail-testo {
    font-size: 17px; line-height: 1.7; font-weight: 400;
    color: var(--ink); margin-bottom: 48px;
  }
  .detail-testo p { margin-bottom: 1.2em; }
  .detail-testo p:last-child { margin-bottom: 0; }
</style>
</head>
<body>
<div class="wrap">

  <!-- CAROSELLO -->
  <div id="view-carousel">
    <div class="section-head">
      <span class="pill">NEWS</span>
      <div class="nav-arrows">
        <button class="arrow" id="prev" type="button" aria-label="Precedente" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="arrow" id="next" type="button" aria-label="Successivo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </div>
    <div class="rule"></div>
    <div class="viewport">
      <div class="track" id="track"><div class="loading">Caricamento…</div></div>
    </div>
  </div>

  <!-- DETTAGLIO IN-PLACE -->
  <div id="view-detail">
    <button class="back-btn" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      TUTTE LE NEWS
    </button>
    <div id="detail-kicker" class="detail-kicker"></div>
    <div class="detail-rule"></div>
    <div id="detail-title" class="detail-title"></div>
    <div id="detail-date" class="detail-date"></div>
    <div id="detail-img" class="detail-img"></div>
    <div id="detail-estratto" class="detail-estratto"></div>
    <div id="detail-testo" class="detail-testo"></div>
  </div>

</div>
<script>
const SHEET_ID  = '16gaKN5vvNRYcnutzrDTiOWLOYyyufm6KlvQC5VCwL2I';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=News';

const HUES     = [18,130,28,210,280,60,160,340];
const PATTERNS = ['diag','grid','dots'];

function placeholderSVG(hue, pat) {
  const bg='oklch(0.78 0.06 '+hue+')', fg='oklch(0.55 0.08 '+hue+')';
  let p='';
  if(pat==='diag') p='<pattern id="p" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="14" height="14" fill="'+bg+'"/><line x1="0" y1="0" x2="0" y2="14" stroke="'+fg+'" stroke-width="6"/></pattern>';
  else if(pat==='grid') p='<pattern id="p" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="'+bg+'"/><path d="M20 0H0v20" stroke="'+fg+'" stroke-width="1" fill="none"/></pattern>';
  else p='<pattern id="p" width="16" height="16" patternUnits="userSpaceOnUse"><rect width="16" height="16" fill="'+bg+'"/><circle cx="8" cy="8" r="2.2" fill="'+fg+'"/></pattern>';
  return '<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs>'+p+'</defs><rect width="400" height="300" fill="url(#p)"/></svg>';
}

function parseCSV(csv) {
  const rows=[];
  let row=[],cur='',inQ=false;
  for(let i=0;i<csv.length;i++){
    const c=csv[i];
    if(inQ){
      if(c==='"'&&csv[i+1]==='"'){cur+='"';i++;}
      else if(c==='"'){inQ=false;}
      else{cur+=c;}
    } else {
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){}
      else{cur+=c;}
    }
  }
  if(cur||row.length){row.push(cur);rows.push(row);}
  return rows;
}

function csvToNews(csv){
  return parseCSV(csv).slice(1).map((cols,i)=>{
    const titolo   = (cols[0]||'').trim();
    const data     = (cols[1]||'').trim();
    const estratto = (cols[2]||'').trim();
    const immagine = (cols[3]||'').trim();
    const tag      = ((cols[5]||'NEWS').trim()).toUpperCase();
    const testo    = (cols[6]||'').trim();
    const pub      = (cols[7]||'').trim().toLowerCase();
    if(pub!=='si'||!titolo) return null;
    return {id:i,titolo,data,estratto,immagine,tag,testo,hue:HUES[i%HUES.length],pattern:PATTERNS[i%PATTERNS.length]};
  }).filter(Boolean);
}

let NEWS = [];

/* ── DETTAGLIO ── */
function showDetail(idx) {
  const n = NEWS[idx];
  if (!n) return;

  document.getElementById('detail-kicker').textContent = n.tag;
  document.getElementById('detail-title').textContent  = n.titolo;
  document.getElementById('detail-date').textContent   = n.data;

  const imgEl = document.getElementById('detail-img');
  imgEl.innerHTML = n.immagine
    ? '<img src="'+n.immagine+'" alt="'+n.titolo+'">'
    : placeholderSVG(n.hue, n.pattern);

  document.getElementById('detail-estratto').textContent = n.estratto;

  const testoEl = document.getElementById('detail-testo');
  testoEl.innerHTML = n.testo
    ? n.testo.split(/\n\n+/).map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('')
    : '';

  document.getElementById('view-carousel').style.display = 'none';
  document.getElementById('view-detail').style.display   = 'block';

  notifyHeight();

  // Scroll to top of widget inside parent
  try { window.parent.postMessage({type:'terrae-scroll-top'},'*'); } catch(e){}
}

function showCarousel() {
  document.getElementById('view-detail').style.display   = 'none';
  document.getElementById('view-carousel').style.display = 'block';
  notifyHeight();
}

function notifyHeight() {
  const h = document.body.scrollHeight;
  try { window.parent.postMessage({type:'terrae-height', height:h},'*'); } catch(e){}
}

document.getElementById('back-btn').addEventListener('click', showCarousel);

/* ── CAROSELLO ── */
const track = document.getElementById('track');

function renderCards() {
  track.innerHTML = '';
  if (!NEWS.length) {
    track.innerHTML = '<div class="error">Nessuna news pubblicata.</div>';
    return;
  }
  NEWS.forEach((n,idx) => {
    const el = document.createElement('article');
    el.className = 'card';
    el.setAttribute('role','button');
    el.setAttribute('tabindex','0');
    el.addEventListener('click', () => showDetail(idx));
    el.addEventListener('keydown', e => { if(e.key==='Enter') showDetail(idx); });

    const thumb = n.immagine
      ? '<img src="'+n.immagine+'" alt="'+n.titolo+'" loading="lazy">'
      : placeholderSVG(n.hue, n.pattern);

    el.innerHTML =
      '<div class="thumb">'+thumb+(n.data?'<span class="date-badge">'+n.data+'</span>':'')+'</div>'+
      '<div class="card-kicker">'+n.tag+'</div>'+
      '<div class="card-title">'+n.titolo+'</div>'+
      (n.estratto?'<div class="card-excerpt">'+n.estratto+'</div>':'');

    track.appendChild(el);
  });
}

let index = 0;
const prev = document.getElementById('prev');
const next = document.getElementById('next');

function cardW() {
  const f = track.querySelector('.card');
  return f ? f.offsetWidth : 325;
}
function visibleCount() {
  const vp = document.querySelector('.viewport');
  return Math.max(1, Math.floor((vp.offsetWidth + 20) / (cardW() + 20)));
}
function update() {
  const v = visibleCount(), max = Math.max(0, NEWS.length - v);
  if(index > max) index = max;
  if(index < 0) index = 0;
  track.style.transform = 'translateX('+(-index*(cardW()+20))+'px)';
  prev.disabled = index <= 0;
  next.disabled = index >= max;
}

let autoplayTimer = null;
const mqMobile = window.matchMedia('(max-width:600px)');
function startAutoplay() {
  stopAutoplay();
  if (!mqMobile.matches) return;
  autoplayTimer = setInterval(() => {
    const v = visibleCount(), max = Math.max(0, NEWS.length - v);
    index = index >= max ? 0 : index + 1;
    update();
  }, 3500);
}
function stopAutoplay() {
  if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
}

prev.addEventListener('click', e => { e.stopPropagation(); stopAutoplay(); index--; update(); });
next.addEventListener('click', e => { e.stopPropagation(); stopAutoplay(); index++; update(); });
document.querySelector('.viewport').addEventListener('touchstart', stopAutoplay, {passive:true});

let rt;
window.addEventListener('resize', () => {
  clearTimeout(rt);
  rt = setTimeout(() => { index=0; update(); startAutoplay(); }, 120);
});
mqMobile.addEventListener?.('change', startAutoplay);

async function loadNews() {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(SHEET_URL+'&t='+Date.now(), {cache:'no-store', signal:ctrl.signal});
    clearTimeout(t);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const csv = await res.text();
    NEWS = csvToNews(csv);
    if (!NEWS.length) throw new Error('Nessuna news con "si" nella colonna Pubblicato');
  } catch(e) {
    track.innerHTML = '<div class="error">Errore: '+(e.name==='AbortError'?'Timeout — foglio non raggiungibile':e.message)+'</div>';
    return false;
  }
  return true;
}

loadNews().then(ok => { if(ok){ renderCards(); update(); startAutoplay(); } });
</script>
</body>
</html>
