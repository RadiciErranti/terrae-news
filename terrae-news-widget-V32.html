<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>TERRAE News Widget</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --ink-2: #1a1a1a;
    --muted: #6b6b66;
    --accent: oklch(0.68 0.17 35);
    --gap: 20px;
    --radius: 4px;
    --visible: 4;
    --dur: 480ms;
  }

  /* responsive: numero colonne visibili */
  @media (max-width: 1100px) { :root { --visible: 3; } }
  @media (max-width: 720px)  { :root { --visible: 2; --gap: 14px; } }
  @media (max-width: 440px)  { :root { --visible: 1; } }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { width: 100%; }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .pill {
    display: inline-flex; align-items: center;
    background: var(--ink); color: #fff;
    padding: 8px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    border: 0; cursor: default;
  }
  .nav-arrows { display: flex; gap: 8px; }
  .arrow {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--ink); background: transparent;
    display: grid; place-items: center;
    cursor: pointer; color: var(--ink);
    transition: background var(--dur), color var(--dur), opacity var(--dur);
  }
  .arrow:hover { background: var(--ink); color: #fff; }
  .arrow:disabled { opacity: 0.25; cursor: not-allowed; }
  .arrow svg { width: 14px; height: 14px; }

  .rule { height: 1px; background: var(--ink); margin-bottom: 24px; }

  .viewport { overflow: hidden; width: 100%; }
  .track {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: calc((100% - (var(--visible) - 1) * var(--gap)) / var(--visible));
    gap: var(--gap);
    transition: transform var(--dur) cubic-bezier(.5,.05,.2,1);
    will-change: transform;
  }

  .card { display: flex; flex-direction: column; gap: 10px; }

  .thumb {
    aspect-ratio: 4 / 3;
    background: #ddd;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .thumb img, .thumb svg {
    display: block; width: 100%; height: 100%; object-fit: cover;
  }
  .badge {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(10,10,10,0.85); color: #fff;
    font: 500 10px/1 'JetBrains Mono', monospace;
    padding: 4px 7px; border-radius: 2px; letter-spacing: 0.04em;
  }
  .date-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(10,10,10,0.85); color: #fff;
    font: 500 10px/1 'JetBrains Mono', monospace;
    padding: 4px 7px; border-radius: 2px; letter-spacing: 0.04em;
  }

  .kicker {
    font: 500 10px/1 'Inter', sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .title { font-size: 14px; line-height: 1.4; font-weight: 700; }
  .title a { color: inherit; text-decoration: none; }
  .title a:hover { text-decoration: underline; }

  .excerpt {
    font-size: 12px; line-height: 1.5; color: var(--muted);
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .actions { display: flex; gap: 5px; margin-top: 2px; }
  .icon-btn {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ink); color: #fff;
    display: grid; place-items: center;
    border: 0; cursor: pointer;
    transition: background 200ms;
  }
  .icon-btn:hover { background: var(--accent); }
  .icon-btn svg { width: 9px; height: 9px; }

  .section-foot { margin-top: 32px; }

  .loading, .error {
    text-align: center; padding: 40px 0;
    font: 500 12px/1 'JetBrains Mono', monospace;
    color: var(--muted);
  }
  .error { color: #c00; }
</style>
</head>
<body>

<div class="wrap">
  <div class="section-head">
    <span class="pill">News</span>
    <div class="nav-arrows">
      <button class="arrow" id="prev" type="button" aria-label="Precedente" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <button class="arrow" id="next" type="button" aria-label="Successivo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <div class="rule"></div>

  <div class="viewport">
    <div class="track" id="track">
      <div class="loading">Caricamento…</div>
    </div>
  </div>

  <div class="section-foot">
    <button class="pill" type="button">Vedi tutte le news</button>
  </div>
</div>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDBZDIqRs45Z9AN3Ta276DRqm11xZfYBwNpuEY0e4_3EVvKCwCkLYe0fOU6QOkGH2jpcYJYHuOtfQE/pub?gid=1277597420&single=true&output=csv';

  const HUES = [18, 130, 28, 210, 280, 60, 160, 340];
  const PATTERNS = ['diag', 'grid', 'dots'];

  function placeholderSVG(hue, pattern) {
    const bg = `oklch(0.78 0.06 ${hue})`;
    const fg = `oklch(0.55 0.08 ${hue})`;
    let pat = '';
    if (pattern === 'diag')
      pat = `<pattern id="p${hue}" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="14" height="14" fill="${bg}"/><line x1="0" y1="0" x2="0" y2="14" stroke="${fg}" stroke-width="6"/></pattern>`;
    else if (pattern === 'grid')
      pat = `<pattern id="p${hue}" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="${bg}"/><path d="M20 0H0v20" stroke="${fg}" stroke-width="1" fill="none"/></pattern>`;
    else
      pat = `<pattern id="p${hue}" width="16" height="16" patternUnits="userSpaceOnUse"><rect width="16" height="16" fill="${bg}"/><circle cx="8" cy="8" r="2.2" fill="${fg}"/></pattern>`;
    return `<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs>${pat}</defs><rect width="400" height="300" fill="url(#p${hue})"/></svg>`;
  }

  function parseCSV(text) {
    const rows = [];
    let row = [], cell = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
        else if (c === '"') inQ = false;
        else cell += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(cell); cell = ''; }
        else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
        else if (c === '\r') {}
        else cell += c;
      }
    }
    if (cell.length || row.length) { row.push(cell); rows.push(row); }
    return rows;
  }

  function csvToNews(text) {
    const rows = parseCSV(text).filter(r => r.some(c => c.trim() !== ''));
    const news = [];
    rows.slice(4).forEach((r, idx) => {
      const titolo     = (r[0] || '').trim();
      const data       = (r[1] || '').trim();
      const estratto   = (r[2] || '').trim();
      const immagine   = (r[3] || '').trim();
      const link       = (r[4] || '').trim();
      const tag        = (r[5] || '').trim();
      const pubblicato = (r[6] || '').trim().toLowerCase();
      if (!titolo) return;
      if (pubblicato !== 'si' && pubblicato !== 'sì') return;
      news.push({ titolo, data, estratto, immagine, link, tag,
        hue: HUES[idx % HUES.length],
        pattern: PATTERNS[idx % PATTERNS.length] });
    });
    return news;
  }

  const track = document.getElementById('track');
  let NEWS = [];

  function renderCards() {
    track.innerHTML = '';
    if (!NEWS.length) {
      track.innerHTML = '<div class="error">Nessuna news pubblicata.</div>';
      return;
    }
    NEWS.forEach(n => {
      const el = document.createElement('article');
      el.className = 'card';
      const thumb = n.immagine
        ? `<img src="${n.immagine}" alt="${n.titolo}" loading="lazy">`
        : placeholderSVG(n.hue, n.pattern);
      el.innerHTML = `
        <div class="thumb">
          ${thumb}
          ${n.tag  ? `<span class="badge">${n.tag}</span>` : ''}
          ${n.data ? `<span class="date-badge">${n.data}</span>` : ''}
        </div>
        <div class="kicker">News</div>
        <div class="title">${n.link ? `<a href="${n.link}" target="_blank" rel="noopener">${n.titolo}</a>` : n.titolo}</div>
        ${n.estratto ? `<div class="excerpt">${n.estratto}</div>` : ''}
        <div class="actions">
          <button class="icon-btn" aria-label="Condividi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
          </button>
          ${n.link ? `<button class="icon-btn" aria-label="Apri" onclick="window.open('${n.link}','_blank')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>` : ''}
        </div>`;
      track.appendChild(el);
    });
  }

  async function loadNews() {
    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      NEWS = csvToNews(await res.text());
    } catch(e) {
      track.innerHTML = `<div class="error">Errore: ${e.message}</div>`;
      return false;
    }
    return true;
  }

  let index = 0;
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');

  function visibleCount() {
    return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--visible')) || 4;
  }

  function update() {
    const v = visibleCount();
    const max = Math.max(0, NEWS.length - v);
    if (index > max) index = max;
    if (index < 0) index = 0;
    track.style.transform = `translateX(calc(${-index} * ((100% + var(--gap)) / ${v})))`;
    prev.disabled = index <= 0;
    next.disabled = index >= max;
  }

  prev.addEventListener('click', () => { index--; update(); });
  next.addEventListener('click', () => { index++; update(); });
  window.addEventListener('resize', update);

  loadNews().then(ok => { if(ok) { renderCards(); update(); } });
</script>
</body>
</html>
