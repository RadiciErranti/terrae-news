<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>TERRAE News Detail Widget V47</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  @font-face {
    font-family: 'AutautGrotesk';
    font-weight: 400;
    src: url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Regular.otf') format('opentype');
  }
  @font-face {
    font-family: 'AutautGrotesk';
    font-weight: 500;
    src: url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Medium.otf') format('opentype');
  }
  @font-face {
    font-family: 'AutautGrotesk';
    font-weight: 600;
    src: url('https://radicierranti.github.io/terrae-assets/AutautGrotesk-Semibold.otf') format('opentype');
  }

  :root {
    --ink: #0a0a0a;
    --muted: #6b6b66;
    --accent: oklch(0.68 0.17 35);
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, .terrae-embed-root {
    background: transparent;
    color: var(--ink);
    font-family: 'AutautGrotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: visible;
  }

  .wrap {
    width: 100%;
    padding-bottom: 40px;
  }

  .loading, .error {
    text-align: center; padding: 60px 0;
    font: 500 12px/1 'AutautGrotesk', monospace;
    color: var(--muted);
  }
  .error { color: #c00; }

  .news-list { display: flex; flex-direction: column; gap: 0; }
  .list-rule { height: 0; margin-bottom: 24px; }

  #view-list { display: none; }
  #view-detail { display: none; }
  .wrap { visibility: hidden; }

  .list-head {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-left: 155px;
    padding-right: 155px;
  }
  .pill {
    display: inline-flex; align-items: center;
    background: var(--ink); color: #fff;
    padding: 8px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
  }

  .list-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 20px;
    padding: 20px 155px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .list-item:first-child { border-top: 0; }
  .list-item:hover .list-title { text-decoration: underline; }

  .list-thumb {
    width: 120px; height: 76px;
    border-radius: var(--radius);
    overflow: hidden; flex-shrink: 0;
    background: #ddd;
  }
  .list-thumb img, .list-thumb svg {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  .list-meta { display: flex; flex-direction: column; gap: 6px; justify-content: center; }
  .list-kicker {
    font: 500 10px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .list-title { font-size: 18px; line-height: 25px; font-weight: 600; }
  .list-date { font-size: 11px; color: var(--muted); }
  .list-excerpt { font-size: 18px; color: var(--muted); line-height: 25px; }

  .detail { display: none; }

  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none;
    cursor: pointer;
    font: 500 11px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
    width: 100%;
    padding: 0 155px;
  }
  .back-btn:hover { color: var(--ink); }
  .back-btn svg { width: 12px; height: 12px; }

  .detail-kicker,
  .detail-title,
  .detail-date,
  .detail-estratto,
  .detail-rule {
    width: 100%;
    box-sizing: border-box;
    padding-left: 155px;
    padding-right: 155px;
  }

  .detail-rule { height: 1px; background: var(--ink); margin-bottom: 32px; }

  .detail-kicker {
    font: 500 10px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .detail-title {
    font-size: 30px;
    line-height: 35px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: 0;
    font-family: 'AutautGrotesk', system-ui, sans-serif;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .detail-date {
    font-size: 11px;
    line-height: 1;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    font-family: 'AutautGrotesk', system-ui, sans-serif;
  }
  .detail-img {
    width: 100%;
    max-height: 460px;
    height: auto;
    padding: 0 155px;
    border-radius: 0;
    overflow: hidden;
    background: transparent;
    margin-bottom: 56px;
    box-sizing: border-box;
  }
  .detail-img img, .detail-img svg {
    width: 100%;
    aspect-ratio: 1130 / 460;
    object-fit: cover;
    display: block;
  }
  .detail-estratto {
    font-size: 18px;
    line-height: 25px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 40px;
    border-bottom: none;
    text-wrap: pretty;
    font-family: 'AutautGrotesk', system-ui, sans-serif;
  }
  .detail-testo {
    font-size: 18px;
    line-height: 25px;
    font-weight: 500;
    color: var(--ink);
    font-family: 'AutautGrotesk', system-ui, sans-serif;
    width: 710px;
    max-width: 100%;
    box-sizing: border-box;
    margin-left: auto;
    margin-right: auto;
    padding-left: 0;
    padding-right: 0;
  }
  .detail-testo p { margin-bottom: 1.2em; }
  .detail-testo p:last-child { margin-bottom: 0; }
  .back-link { margin-top: 2.4em; }
  .back-link-btn {
    background: none; border: none; padding: 0;
    font: 500 11px/1 'AutautGrotesk', sans-serif;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
  }
  .back-link-btn:hover { color: var(--ink); }

  /* ── MOBILE ≤ 480px (breakpoint Readymag) ──────────────── */
  @media (max-width: 480px) {
    .list-head,
    .back-btn,
    .detail-kicker,
    .detail-title,
    .detail-date,
    .detail-estratto,
    .detail-rule {
      padding-left: 20px;
      padding-right: 20px;
    }

    .detail-title {
      font-size: 26px;
      line-height: 32px;
    }

    .detail-estratto,
    .detail-testo {
      font-size: 16px;
      line-height: 24px;
    }

    .detail-img {
      padding: 0;
      max-height: none;
    }

    .list-item {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-left: 20px;
      padding-right: 20px;
    }

    .detail-testo {
      width: 100%;
      padding-left: 20px;
      padding-right: 20px;
      margin-left: 0;
      margin-right: 0;
    }

    .list-thumb {
      width: 100%;
      height: auto;
      aspect-ratio: 325 / 200;
    }
  }

</style>
</head>
<body>
<div class="wrap">
  <div id="view-list">
    <div class="list-head">
      <span class="pill">NEWS</span>
    </div>
    <div class="list-rule"></div>
    <div id="list-container">
      <div class="loading">Caricamento…</div>
    </div>
  </div>

  <div id="view-detail" class="detail">
    <button class="back-btn" id="back-btn" style="display:none">TUTTE LE NEWS</button>
    <div id="detail-date" class="detail-date"></div>
    <div id="detail-title" class="detail-title"></div>
    <div id="detail-estratto" class="detail-estratto"></div>
    <div id="detail-img" class="detail-img"></div>
    <div id="detail-kicker" class="detail-kicker" style="display:none"></div>
    <div class="detail-rule" style="display:none"></div>
    <div id="detail-testo" class="detail-testo"></div>
  </div>
</div>

<script>
  const SHEET_ID  = '16gaKN5vvNRYcnutzrDTiOWLOYyyufm6KlvQC5VCwL2I';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=News`;

  const HUES     = [18, 130, 28, 210, 280, 60, 160, 340];
  const PATTERNS = ['diag', 'grid', 'dots'];

  function placeholderSVG(hue, pattern) {
    const bg = `oklch(0.78 0.06 ${hue})`;
    const fg = `oklch(0.55 0.08 ${hue})`;
    let pat = '';
    if (pattern === 'diag')
      pat = `<pattern id="p${hue}" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="14" height="14" fill="${bg}"/><line x1="0" y1="0" x2="0" y2="14" stroke="${fg}" stroke-width="6"/></pattern>`;
    else if (pattern === 'grid')
      pat = `<pattern id="p${hue}" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="${bg}"/><path d="M20 0H0v20" stroke="${fg}" stroke-width="1" fill="none"/></pattern>`;
    else
      pat = `<pattern id="p${hue}" width="16" height="16" patternUnits="userSpaceOnUse"><rect width="16" height="16" fill="${bg}"/><circle cx="8" cy="8" r="2.2" fill="${fg}"/></pattern>`;
    return `<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs>${pat}</defs><rect width="400" height="300" fill="url(#p${hue})"/></svg>`;
  }

  function parseCSV(csv) {
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i = 0; i < csv.length; i++) {
      const c = csv[i];
      if (inQ) {
        if (c === '"' && csv[i+1] === '"') { cur += '"'; i++; }
        else if (c === '"') { inQ = false; }
        else { cur += c; }
      } else {
        if (c === '"') { inQ = true; }
        else if (c === ',') { row.push(cur); cur = ''; }
        else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
        else if (c === '\r') {}
        else { cur += c; }
      }
    }
    if (cur || row.length) { row.push(cur); rows.push(row); }
    return rows;
  }

  function clean(v) { return (v || '').trim(); }

  function csvToNews(csv) {
    const rows = parseCSV(csv).slice(1);
    return rows.map((cols, i) => {
      const data       = clean(cols[0]);
      const titolo     = clean(cols[1]);
      const estratto   = clean(cols[2]);
      const immagine   = clean(cols[3]);
      const tag        = clean(cols[4]) || 'NEWS';
      const testo      = clean(cols[5]);
      const pubblicato = clean(cols[6]);
      const id         = clean(cols[7]) || String(i); // colonna H: ID fisso tff-DDMMYYYY
      if (pubblicato.toLowerCase() !== 'si') return null;
      if (!titolo) return null;
      return {
        id, titolo, data, estratto, immagine,
        tag: tag.toUpperCase(), testo,
        hue: HUES[i % HUES.length],
        pattern: PATTERNS[i % PATTERNS.length]
      };
    }).filter(Boolean);
  }

  let NEWS = [];

  function reveal() {
    document.querySelector('.wrap').style.visibility = 'visible';
  }

  function findById(id) {
    // cerca prima per ID stringa (tff-DDMMYYYY), poi per indice numerico come fallback
    const byId = NEWS.find(n => n.id === String(id));
    if (byId) return byId;
    const i = parseInt(id, 10);
    return isNaN(i) ? null : NEWS[i] || null;
  }

  function showDetail(idx) {
    const n = typeof idx === 'string' ? findById(idx) : NEWS[idx];
    if (!n) return;

    document.getElementById('detail-kicker').textContent = n.tag;
    document.getElementById('detail-title').textContent  = n.titolo;
    document.getElementById('detail-date').textContent   = n.data;

    const imgEl = document.getElementById('detail-img');
    imgEl.innerHTML = n.immagine
      ? `<img src="${n.immagine}" alt="${n.titolo}">`
      : placeholderSVG(n.hue, n.pattern);

    document.getElementById('detail-estratto').textContent = n.estratto;

    const testoEl = document.getElementById('detail-testo');
    function parseInline(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<span style="font-weight:600">$1</span>')
        .replace(/\*([^*]+?)\*/g, '<span style="font-weight:500">$1</span>');
    }
    const testo = n.testo
      ? n.testo.split(/\n\n+/).map(p => `<p>${parseInline(p.replace(/\n/g, '<br>'))}</p>`).join('')
      : '';
    testoEl.innerHTML = testo + `<p class="back-link"><button class="back-link-btn" id="back-link-btn">← Vedi tutte le news</button></p>`;
    document.getElementById('back-link-btn').addEventListener('click', showList);

    document.getElementById('view-list').style.display   = 'none';
    document.getElementById('view-detail').style.display = 'block';
    reveal();

    try { window.top.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) {
      try { window.parent.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e2) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
  }

  function showList() {
    try { localStorage.removeItem('terrae-news-id'); } catch(e) {}
    try {
      window.top.location.href = 'https://terraefilmfest.xyz/news';
    } catch(e) {
      window.location.href = 'https://terraefilmfest.xyz/news';
    }
  }

  function renderList(opts) {
    const silent = opts && opts.silent;
    const container = document.getElementById('list-container');
    if (!NEWS.length) {
      container.innerHTML = '<div class="error">Nessuna NEWS pubblicata.</div>';
      return;
    }
    container.innerHTML = '';
    NEWS.forEach((n, idx) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.addEventListener('click', () => showDetail(n.id));
      item.addEventListener('keydown', e => { if (e.key === 'Enter') showDetail(n.id); });

      const thumb = n.immagine
        ? `<img src="${n.immagine}" alt="${n.titolo}" loading="lazy">`
        : placeholderSVG(n.hue, n.pattern);

      item.innerHTML = `
        <div class="list-thumb">${thumb}</div>
        <div class="list-meta">
          <div class="list-kicker">${n.tag}</div>
          ${n.data     ? `<div class="list-date">${n.data}</div>` : ''}
          <div class="list-title">${n.titolo}</div>
          ${n.estratto ? `<div class="list-excerpt">${n.estratto}</div>` : ''}
        </div>
      `;
      container.appendChild(item);
    });
    if (!silent) return;
  }

  document.getElementById('back-btn').addEventListener('click', showList);

  let pendingId  = null;
  let newsLoaded = false;

  function applyId(id) {
    try { localStorage.removeItem('terrae-news-id'); } catch(e) {}

    const n = id !== null ? findById(id) : null;
    if (n) {
      document.getElementById('back-btn').style.display = 'none';
      showDetail(n.id);
    } else {
      document.getElementById('view-list').style.display = 'block';
      renderList();
      reveal();
    }
  }

  async function init() {
    try {
      const stored = localStorage.getItem('terrae-news-id');
      if (stored !== null) pendingId = stored; // stringa, non parseInt
    } catch(e) {}

    if (pendingId === null) {
      try {
        const selfVal = new URLSearchParams(window.location.search).get('news');
        if (selfVal !== null) {
          pendingId = selfVal; // stringa
          try { window.history.replaceState({}, '', window.location.pathname); } catch(e) {}
        }
      } catch(e) {}
    }

    if (pendingId === null) {
      try {
        const topVal = new URLSearchParams(window.top.location.search).get('news');
        if (topVal !== null) {
          pendingId = topVal; // stringa
          try { window.top.history.replaceState({}, '', window.top.location.pathname); } catch(e) {}
        }
      } catch(e) {}
    }

    const CACHE_KEY = 'terrae-news-cache';
    const CACHE_TTL = 5 * 60 * 1000;
    let fromCache = false;
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const { ts, data } = JSON.parse(raw);
        if (Date.now() - ts < CACHE_TTL && data && data.length) {
          NEWS = data;
          fromCache = true;
        }
      }
    } catch(e) {}

    if (!fromCache) {
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 8000);
        const res = await fetch(SHEET_URL + '&t=' + Date.now(), { cache: 'no-store', signal: ctrl.signal });
        clearTimeout(t);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const csv = await res.text();
        NEWS = csvToNews(csv);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: NEWS })); } catch(e) {}
      } catch(e) {
        document.getElementById('view-list').style.display = 'block';
        document.getElementById('list-container').innerHTML = `<div class="error">Errore: ${e.name === 'AbortError' ? 'Timeout — foglio non raggiungibile' : e.message}</div>`;
        reveal();
        return;
      }
    }

    newsLoaded = true;
    applyId(pendingId !== null ? pendingId : null);
  }

  setTimeout(function() { init(); }, 300);
</script>
</body>
</html>
